# .github/workflows/scraper.yml
name: Run job scraper

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
  workflow_dispatch:          # lets you trigger manually from the GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # kill if something hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run scraper
        run: node server/scraper/index.js
        env:
          MONGO_URI:        ${{ secrets.MONGO_URI }}
          JSEARCH_API_KEY:  ${{ secrets.JSEARCH_API_KEY }}
          NODE_ENV:         production