# .github/workflows/scraper.yml
name: Run web scraper

on:
  schedule:
    - cron: '0 8,20 * * *'   # twice a day — 08:00 and 20:00 UTC (1:30pm and 1:30am IST)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15        # bumped from 10 — Puppeteer needs more time

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run web scraper
        run: node server/scraper/index.js
        env:
          MONGO_URI:   ${{ secrets.MONGO_URI }}
          NODE_ENV:    production
          CI:          true        # triggers executablePath to use system Chromium